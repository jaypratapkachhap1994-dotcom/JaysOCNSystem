<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JAYS OCN SYSTEM | Gaming • Stories • Digital Power</title>

<meta name="description" content="JAYS OCN SYSTEM is a gaming and creative digital portal featuring Free Fire updates, Candy Crush access, and controlled publishing system.">

<style>

:root{
--main-color:#1e40af;
--accent-color:#22c55e;
--dark-bg:#0f172a;
--card-bg:#111827;
}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:var(--dark-bg);
color:white;
}

header{
background:var(--main-color);
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

#brand{
font-size:24px;
font-weight:bold;
letter-spacing:2px;
}

#brand small{
display:block;
font-size:12px;
font-weight:normal;
opacity:0.8;
}

.sidebar{
position:fixed;
left:0;
top:70px;
width:200px;
height:100%;
background:#1f2937;
padding-top:20px;
}

.sidebar a{
display:block;
padding:12px;
text-decoration:none;
color:white;
font-weight:bold;
transition:0.3s;
}

.sidebar a:hover{
background:var(--main-color);
}

.main{
margin-left:220px;
padding:30px;
}

.section-title{
margin-bottom:20px;
border-bottom:2px solid var(--main-color);
display:inline-block;
padding-bottom:5px;
}

.gaming-zone{
display:flex;
gap:20px;
flex-wrap:wrap;
}

.game-card{
flex:1;
min-width:250px;
background:var(--card-bg);
padding:20px;
border-radius:10px;
position:relative;
transition:0.3s;
}

.game-card:hover{
transform:scale(1.03);
}

.game-card a{
display:block;
margin-top:10px;
padding:8px;
background:var(--accent-color);
color:white;
text-align:center;
text-decoration:none;
border-radius:5px;
}

.status{
position:absolute;
top:10px;
right:10px;
background:red;
padding:5px 10px;
border-radius:20px;
font-size:12px;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{box-shadow:0 0 5px red;}
50%{box-shadow:0 0 20px red;}
100%{box-shadow:0 0 5px red;}
}

.login-box{
position:fixed;
bottom:20px;
right:20px;
background:#1f2937;
padding:20px;
width:220px;
border-radius:10px;
box-shadow:0px 0px 20px rgba(0,0,0,0.5);
}

.login-box input{
width:100%;
padding:8px;
margin:5px 0;
}

.login-box button{
width:100%;
padding:8px;
background:var(--accent-color);
color:white;
border:none;
cursor:pointer;
}

.owner{
text-align:center;
margin-top:10px;
font-weight:bold;
font-size:16px;
color:yellow;
}

footer{
text-align:center;
padding:15px;
margin-top:40px;
opacity:0.6;
font-size:13px;
}

@media(max-width:768px){
.sidebar{display:none;}
.main{margin-left:0;}
}

</style>
</head>

<body>

<header>
<div id="datetime"></div>

<div id="brand">
JAYS OCN SYSTEM
<small>Gaming • Stories • Digital Power</small>
</div>

<div>OCN Portal</div>
</header>

<div class="sidebar">
<a href="https://youtube.com/@jpsunny0004" target="_blank">YouTube</a>
<a href="https://t.me/OCNsystem" target="_blank">Telegram</a>
<a href="https://www.bandlab.com/crackyt0004" target="_blank">BandLab</a>
<a href="https://wazirx.com/invite/3s8fagyj" target="_blank">WazirX</a>
</div>

<div class="main">

<h2 class="section-title">Gaming Zone</h2>

<div class="gaming-zone">

<div class="game-card">
<div class="status">LIVE</div>
<h3>Free Fire</h3>
<p>Battle Royale Action</p>
<a href="https://ffshare.garena.com/?region=IND&lang=en" target="_blank">Official Link</a>
</div>

<div class="game-card">
<div class="status">ONLINE</div>
<h3>Candy Crush Saga</h3>
<p>Puzzle Challenge</p>
<a href="https://ccs.play.king.com/xYwB/fi?deep_link_value=dpid%3D423836031" target="_blank">Play Now</a>
</div>

</div>

<footer>
© 2026 JAYS OCN SYSTEM | Static Version 1.5
</footer>

</div>

<div class="login-box">
<h3>LOGIN (Demo)</h3>
<input type="text" placeholder="Username">
<input type="password" placeholder="Password">
<button>Enter</button>
<div class="owner">Founder: JAYS</div>
</div>

<script>
function updateTime(){
const now = new Date();
document.getElementById("datetime").innerHTML =
now.toLocaleDateString() + " | " + now.toLocaleTimeString();
}
setInterval(updateTime,1000);
updateTime();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JAYS OCN SYSTEM | Version 1.5</title>

<meta name="description" content="JAYS OCN SYSTEM Version 1.5 with Firebase Authentication integration and structured gaming portal.">

<style>
:root{
--main-color:#1e40af;
--accent-color:#22c55e;
--dark-bg:#0f172a;
--card-bg:#111827;
}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:var(--dark-bg);
color:white;
}

header{
background:var(--main-color);
padding:18px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

#brand{
font-size:22px;
font-weight:bold;
}

.sidebar{
position:fixed;
left:0;
top:75px;
width:220px;
height:100%;
background:#1f2937;
padding-top:20px;
}

.sidebar a{
display:block;
padding:14px;
text-decoration:none;
color:white;
font-weight:bold;
border-bottom:1px solid rgba(255,255,255,0.1);
}

.sidebar a:hover{
background:var(--main-color);
}

.main{
margin-left:240px;
padding:30px;
}

.section-title{
border-bottom:2px solid var(--main-color);
display:inline-block;
padding-bottom:6px;
margin-top:30px;
}

.login-box{
margin-top:30px;
background:#1f2937;
padding:20px;
border-radius:10px;
max-width:400px;
}

.login-box input{
width:100%;
padding:10px;
margin:8px 0;
border:none;
border-radius:5px;
}

.login-box button{
width:100%;
padding:10px;
background:var(--accent-color);
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}

#userStatus{
margin-top:10px;
font-size:14px;
opacity:0.8;
}

footer{
text-align:center;
padding:25px;
margin-top:50px;
opacity:0.7;
font-size:13px;
}

@media(max-width:768px){
.sidebar{display:none;}
.main{margin-left:0;}
}
</style>
</head>

<body>

<header>
<div id="datetime"></div>
<div id="brand">JAYS OCN SYSTEM</div>
<div id="userStatus">Not Logged In</div>
</header>

<div class="sidebar">
<a href="https://youtube.com/@jpsunny0004" target="_blank">YouTube</a>
<a href="https://t.me/OCNsystem" target="_blank">Telegram</a>
<a href="https://www.facebook.com/share/18NJr81HGb/" target="_blank">Facebook</a>
<a href="https://wazirx.com/invite/3s8fagyj" target="_blank">WazirX</a>
</div>

<div class="main">

<h2 class="section-title">Gaming Zone</h2>

<p>Firebase Connected Version Ready</p>

<div class="login-box">
<h3>Login System</h3>
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button onclick="loginUser()">Login</button>
<button onclick="logoutUser()">Logout</button>
</div>

<footer>
© 2026 JAYS OCN SYSTEM | Version 1.5 Firebase Build
</footer>

</div>

<!-- Firebase -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.loginUser = function(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
  .then(()=>{
    alert("Login Successful");
  })
  .catch((error)=>{
    alert(error.message);
  });
}

window.logoutUser = function(){
  signOut(auth);
}

onAuthStateChanged(auth, (user)=>{
  const status = document.getElementById("userStatus");

  if(user){
    status.innerText = "Logged In: " + user.email;
  }else{
    status.innerText = "Not Logged In";
  }
});

</script>

<script>
function updateTime(){
const now = new Date();
document.getElementById("datetime").innerHTML =
now.toLocaleDateString() + " | " + now.toLocaleTimeString();
}
setInterval(updateTime,1000);
updateTime();
</script>

</body>
</html>

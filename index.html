<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* -------------------------
 STEP 1: Replace with your Firebase Config
 Firebase Console -> Project Settings -> Web App -> Config
 ------------------------- */
const firebaseConfig = {
  apiKey: "AIzaSyDtUhtccUKRJNNzaFHvqKXMmw0aBZBeUZw",
  authDomain: "734966905680",
  projectId: "jays-ocn-system",
  storageBucket: "jays-ocn-system.firebasestorage.app",
  messagingSenderId: "1:734966905680:android:7e398c7048dee1c23f0a55",
  appId: "YOUR_APP_ID"
};

/* Initialize Firebase */
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* -------------------------
 Login / Logout
 ------------------------- */
window.loginUser = function(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(()=> alert("Login Successful"))
    .catch((error)=> alert(error.message));
}

window.logoutUser = function(){
  signOut(auth);
}

/* -------------------------
 Auth State Listener
 ------------------------- */
onAuthStateChanged(auth, (user)=>{
  const status = document.getElementById("userStatus");
  if(user){
    status.innerText = "Logged In: " + user.email;
    autoNotification(user.email); // Placeholder for auto notifications
  }else{
    status.innerText = "Not Logged In";
  }
});

/* -------------------------
 Auto Notification / New Post Placeholder
 ------------------------- */
function autoNotification(userEmail){
  // Example: Push to Firestore on login
  const colRef = collection(db, "userNotifications");
  addDoc(colRef, {
    email: userEmail,
    message: "User logged in",
    timestamp: new Date()
  }).catch(err=>console.error(err));
}

</script>

<script>
function updateTime(){
const now = new Date();
document.getElementById("datetime").innerHTML =
now.toLocaleDateString() + " | " + now.toLocaleTimeString();
}
setInterval(updateTime,1000);
updateTime();
</script>

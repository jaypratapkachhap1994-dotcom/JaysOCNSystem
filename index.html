<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JAYS OCN SYSTEM | Version 1.8</title>

<style>
:root{
--main-color:#1e40af;
--accent-color:#22c55e;
--dark-bg:#0f172a;
}

body{
margin:0;
font-family:Arial;
background:var(--dark-bg);
color:white;
}

header{
background:var(--main-color);
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.main{
padding:30px;
}

.section{
margin-top:30px;
padding:20px;
background:#111827;
border-radius:10px;
}

button{
padding:8px 12px;
margin-top:8px;
background:var(--accent-color);
border:none;
color:white;
cursor:pointer;
border-radius:5px;
}

.slot{
display:block;
margin-top:8px;
padding:8px;
background:#1f2937;
border-radius:5px;
text-decoration:none;
color:white;
}

#ownerPanel{
display:none;
}

</style>
</head>

<body>

<header>
<div>JAYS OCN SYSTEM</div>
<div id="status">Not Logged In</div>
</header>

<div class="main">

<div class="section">
<h3>Dynamic Custom Links</h3>
<div id="slots"></div>
</div>

<div class="section" id="ownerPanel">
<h3>👑 Owner Dashboard</h3>
<select onchange="changeTheme(this.value)">
<option value="#1e40af">Blue</option>
<option value="#22c55e">Green</option>
<option value="#ffffff">White</option>
</select>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, collection, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
rules_version = '2';
service cloud.firestore {
  match /databases/{database}/documents {
    match /{document=**} {
      allow read, write: if true;
    }
  }
}
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const ownerPanel = document.getElementById("ownerPanel");

onAuthStateChanged(auth, async (user)=>{

  const status = document.getElementById("status");

  if(user){
    status.innerText="Logged In";

    const userDoc = await getDoc(doc(db,"users",user.uid));

    if(userDoc.exists() && userDoc.data().role==="owner"){
      ownerPanel.style.display="block";
    }

  }else{
    status.innerText="Not Logged In";
    ownerPanel.style.display="none";
  }

});

/* REAL-TIME CUSTOM LINKS */
onSnapshot(collection(db,"customLinks"), (snapshot)=>{

  const container = document.getElementById("slots");
  container.innerHTML="";

  snapshot.forEach(doc=>{
    const data = doc.data();

    if(data.title && data.url){
      const link = document.createElement("a");
      link.href=data.url;
      link.target="_blank";
      link.className="slot";
      link.innerText=data.title;
      container.appendChild(link);
    }

  });

});

/* THEME CHANGE */
window.changeTheme = async function(color){

  await setDoc(doc(db,"settings","theme"),{
    mainColor:color
  });

};

/* REAL-TIME THEME LISTENER */
onSnapshot(doc(db,"settings","theme"), (docSnap)=>{
  if(docSnap.exists()){
    document.documentElement.style.setProperty("--main-color", docSnap.data().mainColor);
  }
});

</script>

</body>
</html>

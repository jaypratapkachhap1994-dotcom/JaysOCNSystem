<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JAYS OCN SYSTEM | Version 1.7</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

header{
background:#1e40af;
padding:15px;
display:flex;
justify-content:space-between;
}

.main{
padding:30px;
}

.section{
margin-top:30px;
padding:20px;
background:#111827;
border-radius:10px;
}

button{
padding:8px 12px;
margin-top:8px;
background:#22c55e;
border:none;
color:white;
cursor:pointer;
border-radius:5px;
}

input, textarea{
width:100%;
padding:8px;
margin-top:6px;
border-radius:5px;
border:none;
}

.story{
border-left:4px solid #22c55e;
padding:10px;
margin-top:10px;
background:#1f2937;
}
</style>
</head>

<body>

<header>
<div>JAYS OCN SYSTEM</div>
<div id="status">Not Logged In</div>
</header>

<div class="main">

<!-- STORY SUBMISSION -->
<div class="section">
<h3>Submit Story</h3>
<input type="text" id="title" placeholder="Story Title">
<textarea id="content" placeholder="Write story..."></textarea>
<button onclick="submitStory()">Submit</button>
</div>

<!-- APPROVED STORIES -->
<div class="section">
<h3>Published Stories</h3>
<div id="stories"></div>
</div>

<!-- OWNER PANEL -->
<div class="section" id="ownerPanel" style="display:none;">
<h3>Owner Control</h3>
<p>Approve pending stories in Firebase Console (Next upgrade will automate)</p>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.submitStory = async function(){

  const user = auth.currentUser;
  if(!user){
    alert("Login Required");
    return;
  }

  await addDoc(collection(db,"stories"),{
    title: document.getElementById("title").value,
    content: document.getElementById("content").value,
    status: "pending",
    createdAt: new Date()
  });

  alert("Story Submitted!");
}

async function loadStories(){

  const q = query(collection(db,"stories"), where("status","==","approved"));
  const snapshot = await getDocs(q);

  const container = document.getElementById("stories");
  container.innerHTML="";

  snapshot.forEach(doc=>{
    const data = doc.data();
    const div = document.createElement("div");
    div.className="story";
    div.innerHTML="<h4>"+data.title+"</h4><p>"+data.content+"</p>";
    container.appendChild(div);
  });

}

onAuthStateChanged(auth,(user)=>{
  const status = document.getElementById("status");
  const ownerPanel = document.getElementById("ownerPanel");

  if(user){
    status.innerText="Logged In";
  }else{
    status.innerText="Not Logged In";
  }
});

loadStories();

</script>

</body>
</html>
